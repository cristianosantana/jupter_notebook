syntax = "proto3";

package orion.mcp.v1;

// Contrato V1: alterações só aditivas; breaking → AnalyticsServiceV2.
service AnalyticsServiceV1 {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc RunTool(RunToolRequest) returns (RunToolResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message ListToolsRequest {}

message ListToolsResponse {
  repeated string tool_names = 1;
}

message RunToolRequest {
  string tool_name = 1;
  string args_json = 2;
}

message RunToolResponse {
  bool ok = 1;
  string envelope_json = 2;
  string error = 3;
}
