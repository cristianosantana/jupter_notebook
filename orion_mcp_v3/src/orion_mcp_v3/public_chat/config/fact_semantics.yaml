version: v1

facts:
  faturamento_total_periodo:
    aggregation_rule: lookup
    comparator: none
    source_priority:
      - key_metrics
      - parsed_text
    value_kind: currency
    allows_multiple_values: false
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal
    key_metrics_keys:
      - faturamento_liquido
      - faturamento_por_tipo_de_pagamento

  faturamento_forma_pagamento:
    aggregation_rule: lookup
    comparator: none
    source_priority:
      - key_metrics
      - parsed_text
    value_kind: currency
    allows_multiple_values: false
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal
    key_metrics_keys:
      - faturamento_por_tipo_de_pagamento
    key_metrics_entity_field: tipo
    key_metrics_value_field: valor

  ranking_forma_pagamento:
    aggregation_rule: min
    comparator: asc
    source_priority:
      - key_metrics
      - structured
      - parsed_text
    value_kind: currency
    allows_multiple_values: true
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal
    key_metrics_keys:
      - faturamento_por_tipo_de_pagamento

  ranking_forma_pagamento_desc:
    aggregation_rule: max
    comparator: desc
    source_priority:
      - key_metrics
      - structured
      - parsed_text
    value_kind: currency
    allows_multiple_values: true
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal
    key_metrics_keys:
      - faturamento_por_tipo_de_pagamento
