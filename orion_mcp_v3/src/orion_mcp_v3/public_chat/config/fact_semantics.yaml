version: v1

facts:
  faturamento_total_periodo:
    aggregation_rule: lookup
    comparator: none
    source_priority:
      - key_metrics
      - parsed_text
    value_kind: currency
    allows_multiple_values: false
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal
    key_metrics_keys:
      - faturamento_liquido

  ranking_forma_pagamento:
    aggregation_rule: min
    comparator: asc
    source_priority:
      - structured
      - parsed_text
    value_kind: currency
    allows_multiple_values: true
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal

  ranking_forma_pagamento_desc:
    aggregation_rule: max
    comparator: desc
    source_priority:
      - structured
      - parsed_text
    value_kind: currency
    allows_multiple_values: true
    memory_themes:
      - fechamento_gerencial
      - fechamento_gerencial_mensal

  faturamento_departamento_oficina:
    aggregation_rule: lookup
    comparator: none
    source_priority:
      - key_metrics
      - parsed_text
    value_kind: currency
    allows_multiple_values: false
    memory_themes:
      - vendas_departamento
    key_metrics_keys:
      - oficina
      - departamento_oficina

  participacao_oficina:
    aggregation_rule: derived
    comparator: none
    source_priority: []
    value_kind: pct
    allows_multiple_values: false
    derived_from:
      - faturamento_departamento_oficina
      - faturamento_total_periodo
